[pytest]
# Pytest configuration for AutoPilot
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v 
    --strict-markers 
    --tb=short 
    --disable-warnings
    -p no:warnings
asyncio_mode = auto
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    api: API endpoint tests
    agent: Agent-specific tests
    mock: Tests using mocks

[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.::
    if TYPE_CHECKING:
    @abstractmethod
